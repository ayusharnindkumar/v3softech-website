<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a1f44">
  <title>V3 Software Technology — Contact Us</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>

<section id="contact">
  <div class="section-inner">

    <div class="section-header fade-up">
      <div class="section-tag" style="background:rgba(0,212,232,0.12);border-color:rgba(0,212,232,0.3);">Get In Touch</div>
      <h2 class="section-title" style="color:#fff;">Contact <span>Us</span></h2>
      <div class="section-divider"></div>
    </div>

    <div class="contact-grid">

      <!-- Left: info + map -->
      <div class="fade-up">
        <div class="contact-info">
          <h3>Visit / Call Us</h3>

          <div class="info-row">
            <div class="info-icon">
              <svg fill="none" stroke="#00d4e8" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .82h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            </div>
            <div class="info-text">
              <strong>Phone</strong>
              <a href="tel:9503666566">9503666566</a><br>
              <a href="tel:9096566640">9096566640</a>
            </div>
          </div>

          <div class="info-row">
            <div class="info-icon">
              <svg fill="none" stroke="#00d4e8" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="info-text">
              <strong>Email</strong>
              <a href="mailto:info.v3softech@gmail.com">info.v3softech@gmail.com</a>
            </div>
          </div>

          <div class="info-row">
            <div class="info-icon">
              <svg viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </div>
            <div class="info-text">
              <strong>WhatsApp</strong>
              <a href="https://wa.me/919503666566" target="_blank" style="color:#25D366;">Chat with us on WhatsApp →</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: enquiry form -->
      <div class="fade-up">
        <div class="contact-form-box">
          <h3>Send Us an Enquiry</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" placeholder="Your name">
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" placeholder="Your phone">
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Your email">
          </div>
          <div class="form-group">
            <label>Interested Course</label>
            <select>
              <option value="">-- Select a Course --</option>
              <optgroup label="Mechanical CAD">
                <option>AutoCAD Mechanical</option>
                <option>SolidWorks</option>
                <option>CATIA V5/V6</option>
                <option>Creo (PTC)</option>
                <option>ANSYS</option>
                <option>NX / Unigraphics</option>
                <option>Press Tool Design</option>
                <option>Plastic Products Design</option>
                <option>Welding Fixtures</option>
              </optgroup>
              <optgroup label="Civil CAD">
                <option>AutoCAD Civil</option>
                <option>Google SketchUp</option>
                <option>Interior &amp; Exterior Design</option>
              </optgroup>
              <optgroup label="Electrical CAD">
                <option>AutoCAD Electrical</option>
                <option>Wire Harness Design</option>
              </optgroup>
              <optgroup label="Corporate / IT">
                <option>Corporate Training</option>
                <option>Design Consultancy</option>
                <option>Career Development</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Any questions or special requirements..."></textarea>
          </div>
          <button class="btn-submit" onclick="alert('Thank you! We will contact you shortly. 📞')">Send Enquiry →</button>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="css/header.js"></script>
</body>
</html>
